enum ExpenseCategory {
  Food
  Travel
  Accommodation
  Miscellaneous
  GrosseryShopping
  Entertainment
  HealthandWellness
  Education
  PersonalCare
  Utilities
  SubscriptionServices
  GiftsandDonations
  BusinessExpenses
}

enum status {
  Pending
  Approved
  Rejected
}

type Expense @model @auth(rules: [{allow: owner, ownerField: "owner"}])
{
  title: String
  amount: Float
  date: String
  category: ExpenseCategory
  status: status
  description: String
}